name: Build and Commit Bubble Room

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20.x'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build bundle
        run: npm run build

      - name: Commit build file
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add lovelace-bubble-room.js lovelace-bubble-room.js.map
          git commit -m "Auto-build: update bundle" || echo "No changes to commit"

      - name: Push build file to current branch
        run: |
          git push origin HEAD:${{ github.ref_name }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: bubble-room-bundle
          path: |
            lovelace-bubble-room.js
            lovelace-bubble-room.js.map
